name: Build and attach PDF

on:
  release:
    types: [published]

jobs:
  render-to-pdf:
    name: Convert Markdown to PDF and upload to release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc + LaTeX engine
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - name: Convert README.md to PDF
        run: |
          mkdir -p output
          pandoc Namngivning_Meshcore_Noder.md \
            -o output/Namngivning_Meshcore_Noder.pdf \
            --pdf-engine=xelatex \
            --metadata title="Namngivning av Meshcore Noder i Sverige" \
            --metadata date="$(date '+%Y-%m-%d')"

      - name: Upload PDF as a release asset
        uses: softprops/action-gh-release@v2
        with:
          files: output/Namngivning_Meshcore_Noder.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
