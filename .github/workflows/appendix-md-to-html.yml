name: Render kommuner HTML and upload to release

on:
  release:
    types: [published]

permissions:
  contents: write   # allow upload/update of release assets

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip install pandas

      - name: Build HTML
        run: |
          python3 - <<'PYCODE'
          import pandas as pd
          import re
          import sys
          from pathlib import Path
          from datetime import date

          # ── 1. Read source ──────────────────────────────────────────────────
          src  = Path("appendix_-_kommuner_med_flygplatser_och_förkortningar_Komplett.md")
          text = src.read_text(encoding="utf-8", errors="ignore")
          all_lines = text.splitlines()

          # Split at first table line
          table_start = next(i for i, l in enumerate(all_lines) if l.startswith("| Storleks"))
          intro_raw   = "\n".join(all_lines[:table_start]).strip()
          table_lines = [l for l in all_lines[table_start:] if l.startswith("|")]

          # ── 2. Convert intro markdown → HTML ────────────────────────────────
          def md_to_html_inline(s):
              s = re.sub(r"^#{1,6} (.+)$", lambda x: f"<h2>{x.group(1)}</h2>", s, flags=re.MULTILINE)
              s = re.sub(r"\*\*(.+?)\*\*", r"<strong>\1</strong>", s)
              s = re.sub(r"`(.+?)`", r"<code>\1</code>", s)
              s = re.sub(r"\[([^\]]+)\]\((https?://[^)]+)\)", r'<a href="\2">\1</a>', s)
              paras = [p.strip() for p in re.split(r"\n{2,}", s) if p.strip()]
              out = []
              for p in paras:
                  out.append(p if p.startswith("<h2>") else f"<p>{p}</p>")
              return "\n".join(out)

          intro_html = md_to_html_inline(intro_raw)

          # ── 3. Parse table: primary rows + continuation rows ─────────────────
          def parse_cells(line):
              return [c.strip() for c in line.split("|")]

          airport_map = {}
          current = None
          for line in table_lines:
              cells = parse_cells(line)
              ordning = cells[1] if len(cells) > 1 else ""
              if re.match(r"^[\-\s:]+$", ordning) or ordning == "Storleks- ordning":
                  continue
              is_cont = ordning.strip() == ""
              if is_cont:
                  fp   = cells[2] if len(cells) > 2 else ""
                  iata = cells[3] if len(cells) > 3 else ""
                  icao = cells[4] if len(cells) > 4 else ""
                  if current and (fp or iata or icao):
                      airport_map[current].append(dict(name=fp, iata=iata, icao=icao))
              else:
                  current = cells[3] if len(cells) > 3 else ""
                  if current not in airport_map:
                      airport_map[current] = []
                  fp   = cells[7] if len(cells) > 7 else ""
                  iata = cells[8] if len(cells) > 8 else ""
                  icao = cells[9] if len(cells) > 9 else ""
                  if fp or iata or icao:
                      airport_map[current].append(dict(name=fp, iata=iata, icao=icao))

          multi_airport_kommuner = {k for k, v in airport_map.items() if len(v) > 1}

          primary_rows = []
          header_cells = None
          for line in table_lines:
              cells = parse_cells(line)
              ordning = cells[1] if len(cells) > 1 else ""
              if re.match(r"^[\-\s:]+$", ordning):
                  continue
              if ordning.strip() == "Storleks- ordning":
                  header_cells = [" ".join(c.split()) for c in cells[1:]]
                  continue
              if ordning.strip() == "":
                  continue
              primary_rows.append(cells[1:])

          if not header_cells or not primary_rows:
              sys.exit("Could not build DataFrame")

          n  = len(header_cells)
          primary_rows = [r[:n] + [""] * (n - len(r)) for r in primary_rows]
          df = pd.DataFrame(primary_rows, columns=header_cells)

          def col(name):
              return next((c for c in df.columns if name in c), None)

          kommun_col = col("Kommun")
          iata_c     = col("IATA")
          icao_c     = col("ICAO")
          fp_c       = col("Flygplatsnamn")

          # ── 4. Build HTML rows ───────────────────────────────────────────────
          def esc(v):
              return (str(v).replace("&","&amp;").replace("<","&lt;")
                            .replace(">","&gt;").replace('"',"&quot;"))

          # thead: 4-space indent to match wrapper > table > thead hierarchy
          thead_cells_html = "".join(f"<th>{esc(h)}</th>" for h in header_cells)
          thead = f"    <thead><tr>{thead_cells_html}</tr></thead>"

          tbody_rows = []
          for _, row in df.iterrows():
              kommune  = str(row.get(kommun_col, "")).strip()
              aps      = airport_map.get(kommune, [])
              n_ap     = len(aps)
              is_multi = kommune in multi_airport_kommuner
              has_ap   = n_ap > 0

              if is_multi:
                  cls = ' class="multi-airport"'
              elif has_ap:
                  cls = ' class="has-airport"'
              else:
                  cls = ""

              cells_html = []
              for h in header_cells:
                  val = esc(row[h])
                  if h == fp_c and is_multi:
                      extras = aps[1:]
                      extra_lines = "".join(
                          f'<div class="extra-ap">{esc(a["name"])}'
                          f'{"&nbsp;<span class=iata>" + esc(a["iata"]) + "</span>" if a["iata"] else ""}'
                          f'{"&nbsp;<span class=icao>" + esc(a["icao"]) + "</span>" if a["icao"] else ""}'
                          f'</div>'
                          for a in extras
                      )
                      badge = f'<span class="ap-badge">{n_ap} flygplatser</span>'
                      val = f"{badge} {val}{extra_lines}"
                  cells_html.append(f"<td>{val}</td>")

              tbody_rows.append(f"<tr{cls}>{''.join(cells_html)}</tr>")

          # tbody: opening tag at 4-space indent; rows and closing tag at col 0
          tbody = "    <tbody>\n" + "\n".join(tbody_rows) + "\n</tbody>"

          build_date = date.today().isoformat()
          n_multi    = len(multi_airport_kommuner)

          # ── 5. Assemble HTML ─────────────────────────────────────────────────
          # Built as a Python list — every string stays indented inside the YAML
          # block scalar, so no column-0 content that would break YAML parsing.
          L = []
          L.append("<!DOCTYPE html>")
          L.append('<html lang="sv">')
          L.append("<head>")
          L.append('  <meta charset="UTF-8">')
          L.append('  <meta name="viewport" content="width=device-width, initial-scale=1.0">')
          L.append("  <title>Appendix &ndash; Kommuner med rekommenderade f&ouml;rkortningar, samt flygplatskoder</title>")
          L.append('  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">')
          L.append('  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>')
          L.append('  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>')
          L.append("  <style>")
          L.append("    :root {")
          L.append("      --accent:        #1a6bbf;")
          L.append("      --airport-bg:    #d4edda;")
          L.append("      --airport-hover: #b8dfc4;")
          L.append("      --multi-bg:      #fff3cd;")
          L.append("      --multi-hover:   #ffe89a;")
          L.append("      --bg:            #f8f9fa;")
          L.append("      --border:        #dee2e6;")
          L.append("      --text:          #212529;")
          L.append("    }")
          L.append("    * { box-sizing: border-box; margin: 0; padding: 0; }")
          L.append("    body {")
          L.append('      font-family: "Segoe UI", Arial, sans-serif;')
          L.append("      font-size: 13px;")
          L.append("      color: var(--text);")
          L.append("      background: var(--bg);")
          L.append("      padding: 24px 32px 48px;")
          L.append("    }")
          L.append("    header { border-bottom: 3px solid var(--accent); margin-bottom: 20px; padding-bottom: 12px; }")
          L.append("    header h1 { font-size: 1.35rem; color: var(--accent); margin-bottom: 4px; }")
          L.append("    header .meta { font-size: 0.78rem; color: #6c757d; }")
          L.append("    .intro {")
          L.append("      background: #fff;")
          L.append("      border: 1px solid var(--border);")
          L.append("      border-left: 4px solid var(--accent);")
          L.append("      border-radius: 4px;")
          L.append("      padding: 14px 18px;")
          L.append("      margin-bottom: 20px;")
          L.append("      max-width: 900px;")
          L.append("    }")
          L.append("    .intro h2 { font-size: 1rem; margin: 10px 0 4px; color: var(--accent); }")
          L.append("    .intro p  { margin: 6px 0; line-height: 1.5; }")
          L.append("    .intro a  { color: var(--accent); }")
          L.append("    .intro code { background: #e9ecef; padding: 1px 5px; border-radius: 3px; font-size: 0.85em; }")
          L.append("    .legend {")
          L.append("      display: flex; flex-wrap: wrap; gap: 16px;")
          L.append("      align-items: center;")
          L.append("      margin-bottom: 14px;")
          L.append("      font-size: 0.82rem; color: #495057;")
          L.append("    }")
          L.append("    .legend-item { display: flex; align-items: center; gap: 6px; }")
          L.append("    .legend-dot {")
          L.append("      width: 14px; height: 14px;")
          L.append("      border-radius: 3px; flex-shrink: 0;")
          L.append("    }")
          L.append("    .legend-dot.green  { background: var(--airport-bg); border: 1px solid #6abf7a; }")
          L.append("    .legend-dot.amber  { background: var(--multi-bg);   border: 1px solid #e6b800; }")
          L.append("    #wrapper { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 16px; }")
          L.append("    table.dataTable { width: 100% !important; border-collapse: collapse; font-size: 12px; }")
          L.append("    table.dataTable thead th {")
          L.append("      background: var(--accent); color: #fff;")
          L.append("      padding: 8px 10px; white-space: nowrap; border: none;")
          L.append("    }")
          L.append("    table.dataTable thead th.sorting:after,")
          L.append("    table.dataTable thead th.sorting_asc:after,")
          L.append("    table.dataTable thead th.sorting_desc:after { color: rgba(255,255,255,0.75); }")
          L.append("    table.dataTable tbody td {")
          L.append("      padding: 5px 8px; border-bottom: 1px solid #e9ecef; vertical-align: top;")
          L.append("    }")
          L.append("    table.dataTable tbody tr:hover td             { background: #eaf2fb !important; }")
          L.append("    table.dataTable tbody tr.has-airport td       { background: var(--airport-bg); }")
          L.append("    table.dataTable tbody tr.has-airport:hover td { background: var(--airport-hover) !important; }")
          L.append("    table.dataTable tbody tr.multi-airport td       { background: var(--multi-bg); }")
          L.append("    table.dataTable tbody tr.multi-airport:hover td { background: var(--multi-hover) !important; }")
          L.append("    .ap-badge {")
          L.append("      display: inline-block;")
          L.append("      background: #e6b800; color: #333;")
          L.append("      font-size: 0.72em; font-weight: 700;")
          L.append("      padding: 1px 5px; border-radius: 10px;")
          L.append("      vertical-align: middle; margin-right: 4px;")
          L.append("    }")
          L.append("    .extra-ap {")
          L.append("      margin-top: 3px; font-size: 0.85em; color: #555;")
          L.append("    }")
          L.append("    .iata, .icao {")
          L.append("      display: inline-block;")
          L.append("      font-size: 0.78em; font-weight: 600;")
          L.append("      padding: 0 3px; border-radius: 3px;")
          L.append("    }")
          L.append("    .iata { background: #cfe2ff; color: #084298; }")
          L.append("    .icao { background: #e2e3e5; color: #383d41; }")
          L.append("    .dataTables_wrapper .dataTables_filter input {")
          L.append("      border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px;")
          L.append("    }")
          L.append("    .dataTables_wrapper .dataTables_length select {")
          L.append("      border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px;")
          L.append("    }")
          L.append("    footer { margin-top: 24px; font-size: 0.75rem; color: #adb5bd; text-align: center; }")
          L.append("  </style>")
          L.append("</head>")
          L.append("<body>")
          L.append("")
          L.append("<header>")
          L.append("  <h1>Appendix &ndash; Kommuner med rekommenderade f&ouml;rkortningar, samt flygplatskoder</h1>")
          L.append('  <div class="meta">')
          L.append(f"    Genererad: {build_date} &nbsp;&bull;&nbsp; {len(df)} kommuner &nbsp;&bull;&nbsp;")
          L.append(f"    {n_multi} kommuner med flera flygplatser")
          L.append("  </div>")
          L.append("</header>")
          L.append("")
          L.append(f'<div class="intro">{intro_html}</div>')
          L.append("")
          L.append('<div class="legend">')
          L.append('  <div class="legend-item">')
          L.append('    <div class="legend-dot green"></div>')
          L.append("    Gr&ouml;n = kommunen har en flygplats")
          L.append("  </div>")
          L.append('  <div class="legend-item">')
          L.append('    <div class="legend-dot amber"></div>')
          L.append("    Gul = kommunen har <strong>flera flygplatser</strong> (alla visas i cellen)")
          L.append("  </div>")
          L.append("</div>")
          L.append("")
          L.append('<div id="wrapper">')
          L.append('  <table id="kommuner" class="dataTable display compact" style="width:100%">')
          L.append(thead)
          L.append(tbody)
          L.append("  </table>")
          L.append("</div>")
          L.append("")
          L.append("<footer>")
          L.append("  frav_se, PappaNiklas, haxdoggy, DanielPaulsson, Burt Persson &mdash;")
          L.append('  SysOps f&ouml;r <a href="http://had.meshmapper.net/">had.meshmapper.net</a>')
          L.append("  &nbsp;&bull;&nbsp; Discord SWEDEN-MESH#halland")
          L.append("</footer>")
          L.append("")
          L.append("<script>")
          L.append("  $(document).ready(function () {")
          L.append('    $("#kommuner").DataTable({')
          L.append("      pageLength: -1,")
          L.append("      paging: false,")
          L.append('      lengthMenu: [[25, 50, 100, -1], [25, 50, 100, "Alla"]],')
          L.append("      language: {")
          L.append('        search:       "S&ouml;k:",')
          L.append('        lengthMenu:   "Visa _MENU_ rader",')
          L.append('        info:         "Visar _START_&ndash;_END_ av _TOTAL_ kommuner",')
          L.append('        infoEmpty:    "Inga kommuner att visa",')
          L.append('        infoFiltered: "(filtrerat fr&aring;n _MAX_ totalt)",')
          L.append('        zeroRecords:  "Inga matchande kommuner hittades",')
          L.append("        paginate: {")
          L.append('          first: "F&ouml;rst", last: "Sist",')
          L.append('          next: "N&auml;sta", previous: "F&ouml;reg&aring;ende"')
          L.append("        }")
          L.append("      }")
          L.append("    });")
          L.append("  });")
          L.append("</script>")
          L.append("</body>")
          L.append("</html>")
          html = "\n".join(L) + "\n"
          out = Path("output")
          out.mkdir(exist_ok=True)
          (out / f"Appendix_Kommuner_forkortningar_{build_date}.html").write_text(html, encoding="utf-8")
          print(f"Done - {len(df)} kommuner, {n_multi} med flera flygplatser")
          PYCODE

      - name: Upload HTML as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: output/Appendix_Kommuner_forkortningar_*.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
