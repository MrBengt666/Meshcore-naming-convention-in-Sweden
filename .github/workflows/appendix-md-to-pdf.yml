name: Render kommuner PDF and upload to release

on:
  release:
    types: [published]

permissions:
  contents: write   # allow upload/update of release assets

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python + Pandoc setup
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended python3 python3-pip
          pip install pandas tabulate

      # Extract only selected columns from table in Markdown
      - name: Preprocess Markdown
        run: |
          python3 - <<'PYCODE'
          import pandas as pd, re, sys
          from pathlib import Path

          src = Path("appendix_-_kommuner_med_flygplatser_och_förkortningar_Komplett.md")
          text = src.read_text(encoding="utf-8", errors="ignore")

          # Find first markdown table starting with "| Storleks"
          m = re.search(r"(\| *Storleks[^\n]+(\n\|[^\n]+)+)", text)
          if not m:
              sys.exit("Could not find markdown table")

          table_md = m.group(1)

          # Parse rows manually; skip alignment/separator lines (|:---:|...)
          rows = []
          for line in table_md.splitlines():
              line = line.strip()
              if not line.startswith("|"):
                  continue
              if re.match(r"^\|[\s\-:]+\|", line):
                  continue
              cells = [c.strip() for c in line.strip("|").split("|")]
              rows.append(cells)

          if len(rows) < 2:
              sys.exit("Not enough rows parsed from table")

          headers = rows[0]
          data = rows[1:]

          # Pad or truncate rows to header length
          n = len(headers)
          data = [r[:n] + [""] * (n - len(r)) for r in data]

          df = pd.DataFrame(data, columns=headers)

          # Normalize column names: collapse internal whitespace so
          # "Storleks- ordning" and "Storleks-  ordning" both match
          df.columns = [" ".join(c.split()) for c in df.columns]

          # Desired columns -> output names
          keep = {
              "Storleks- ordning":   "Storleksordning",
              "Kommun":              "Kommun",
              "Kommun- förkortning": "Kommunförkortning",
              "Centralort":          "Centralort",
              "IATA":                "IATA",
              "ICAO":                "ICAO",
              "Folkmängd":           "Folkmängd",
          }

          missing = [k for k in keep if k not in df.columns]
          if missing:
              print("Available columns:", df.columns.tolist(), file=sys.stderr)
              sys.exit(f"Missing expected columns: {missing}")

          df = df[list(keep.keys())].rename(columns=keep).copy()

          # Drop rows where Kommun is blank (continuation rows, etc.)
          df = df[df["Kommun"].str.strip().astype(bool)].reset_index(drop=True)

          out_md = "# Sveriges kommuner med flygplatser (urval)\n\n"
          out_md += df.to_markdown(index=False)
          Path("output.md").write_text(out_md, encoding="utf-8")
          print(f"Done – {len(df)} rows written to output.md")
          PYCODE

      # Convert reduced Markdown to PDF
      - name: Convert to PDF
        run: |
          mkdir -p output
          pandoc output.md \
            -o output/Kommuner_Flygplatser.pdf \
            --pdf-engine=xelatex \
            --metadata title="Kommuner med flygplatser" \
            --metadata date="$(date '+%Y-%m-%d')"

      # Upload PDF to the release that triggered this workflow
      - name: Upload PDF as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: output/Kommuner_Flygplatser.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
