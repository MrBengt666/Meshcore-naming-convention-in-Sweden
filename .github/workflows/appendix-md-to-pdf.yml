name: Render kommuner PDF and upload to release

on:
  release:
    types: [published]

permissions:
  contents: write   # allow upload/update of release assets

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python + Pandoc setup
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended python3 python3-pip
          pip install pandas tabulate

      # Write the preamble text to a separate UTF-8 file so Swedish chars survive
      - name: Write preamble
        run: |
          python3 -c "
          from pathlib import Path
          Path('preamble.md').write_text(
              'frav\\_se\\*, PappaNiklas\\*, haxdoggy\\*, DanielPaulsson\\*, Burt Persson'
              ' \u2014 \\* SysOps f\u00f6r http://had.meshmapper.net/'
              ' Kontakt: Discord SWEDEN-MESH\\#halland'
              ' \u2014 https://discord.com/channels/1359596001240944660/146797\n\n'
              'Denna lista visar sveriges 290 komuner och ger rekommenderar f\u00f6rkortning'
              ' att anv\u00e4nda f\u00f6r namning av mesh-noder. Listan utg\u00f6r ett appendix till'
              ' dokumentet: **Namngivning\\_Meshcore\\_Noder**.'
              ' Tabellen ger ett urval av kolumner - mer data finns i md-filen p\u00e5 GitHub.'
              ' Kolumnen \u00e4r kommunens plats rankad efter befolkningsm\u00e4ngd.\n\n',
              encoding='utf-8'
          )
          "

      # Extract only selected columns from table in Markdown
      - name: Preprocess Markdown
        run: |
          python3 - <<'PYCODE'
          import pandas as pd, re, sys, textwrap
          from pathlib import Path

          src = Path("appendix_-_kommuner_med_flygplatser_och_förkortningar_Komplett.md")
          text = src.read_text(encoding="utf-8", errors="ignore")

          # Find first markdown table starting with "| Storleks"
          m = re.search(r"(\| *Storleks[^\n]+(\n\|[^\n]+)+)", text)
          if not m:
              sys.exit("Could not find markdown table")

          table_md = m.group(1)

          # Parse rows manually; skip alignment/separator lines (|:---:|...)
          rows = []
          for line in table_md.splitlines():
              line = line.strip()
              if not line.startswith("|"):
                  continue
              if re.match(r"^\|[\s\-:]+\|", line):
                  continue
              cells = [c.strip() for c in line.strip("|").split("|")]
              rows.append(cells)

          if len(rows) < 2:
              sys.exit("Not enough rows parsed from table")

          headers = rows[0]
          data = rows[1:]

          # Pad or truncate rows to header length
          n = len(headers)
          data = [r[:n] + [""] * (n - len(r)) for r in data]

          df = pd.DataFrame(data, columns=headers)

          # Normalize column names: collapse internal whitespace
          df.columns = [" ".join(c.split()) for c in df.columns]

          # Desired columns -> output names
          keep = {
              "Storleks- ordning":   "Storleksordning",
              "Kommun":              "Kommun",
              "Kommun- förkortning": "Kommunförkortning",
              "Centralort":          "Centralort",
              "IATA":                "IATA",
              "ICAO":                "ICAO",
              "Folkmängd":           "Folkmängd",
          }

          missing = [k for k in keep if k not in df.columns]
          if missing:
              print("Available columns:", df.columns.tolist(), file=sys.stderr)
              sys.exit(f"Missing expected columns: {missing}")

          df = df[list(keep.keys())].rename(columns=keep).copy()

          # Drop rows where Kommun is blank (continuation rows, etc.)
          df = df[df["Kommun"].str.strip().astype(bool)].reset_index(drop=True)

          # Wrap long cell text so it does not overflow into adjacent cells
          MAX_CHARS = {
              "Storleksordning":    6,
              "Kommun":            22,
              "Kommunförkortning":  6,
              "Centralort":        18,
              "IATA":               4,
              "ICAO":               4,
              "Folkmängd":          9,
          }
          for col, width in MAX_CHARS.items():
              if col in df.columns:
                  df[col] = df[col].apply(
                      lambda v: "\n".join(textwrap.wrap(str(v), width)) if pd.notna(v) else v
                  )

          preamble = Path("preamble.md").read_text(encoding="utf-8")
          out_md = preamble + df.to_markdown(index=False)
          Path("output.md").write_text(out_md, encoding="utf-8")
          print(f"Done - {len(df)} rows written to output.md")
          PYCODE

      # Convert reduced Markdown to PDF
      - name: Convert to PDF
        run: |
          mkdir -p output
          BUILD_DATE=$(date '+%Y-%m-%d')
          PDF_NAME="Appendix_Kommuner_forkortningar_${BUILD_DATE}.pdf"

          # LaTeX header: landscape A4, narrow margins, small font
          cat > header.tex << 'LATEX'
          \usepackage{geometry}
          \geometry{a4paper,landscape,margin=1cm}
          \usepackage{booktabs}
          \usepackage{longtable}
          \usepackage{array}
          \setlength{\tabcolsep}{4pt}
          LATEX

          pandoc output.md \
            -o "output/${PDF_NAME}" \
            --pdf-engine=xelatex \
            --include-in-header=header.tex \
            -V fontsize=7pt \
            -V geometry:landscape \
            -V geometry:"margin=1cm" \
            --metadata title="Appendix - Kommuner med rekommenderade förkortninger, samt flygplatser-koder" \
            --metadata date="${BUILD_DATE}"

          echo "PDF_NAME=${PDF_NAME}" >> $GITHUB_ENV

      # Upload PDF to the release that triggered this workflow
      - name: Upload PDF as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: output/${{ env.PDF_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
